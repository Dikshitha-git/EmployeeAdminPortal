name: SonarQube

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build, test and analyze
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory -Force
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner

      - name: Restore, build, test and analyze
        shell: powershell
        env:
         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
           ${{ runner.temp }}\scanner\dotnet-sonarscanner begin /k:"Dikshitha-git_EmployeeAdminPortal" /o:"dikshitha-git" /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
           dotnet restore .\EmployeeAdminPortal.csproj
           dotnet restore .\EmployeeAdminPortal.Tests\EmployeeAdminPortal.Tests.csproj
           dotnet build .\EmployeeAdminPortal.csproj --no-restore
           dotnet test .\EmployeeAdminPortal.Tests\EmployeeAdminPortal.Tests.csproj --verbosity normal
           ${{ runner.temp }}\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"